function sm2(word, quality) {
  var t = today();

    return Object.assign(base, { repetitions: 0, interval: 1, easeFactor: Math.max(1.3, word.easeFactor - 0.2), nextReviewDate: addDays(t, 1), graduated: false });

function fetchCloud(url) {
  var requestId = "fetch_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
  return fetch(url + "?action=read&_t=" + Date.now() + "&id=" + requestId, { redirect: "follow" })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.status === "ok") return d;
      throw new Error(d.message || "cloud error");
    });
}

function pushCloud(url, state) {
  var ts = Date.now();
  var requestId = "push_" + ts + "_" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem(STORAGE_KEY + "-ts", String(ts));
  var payload = JSON.stringify({ timestamp: ts, data: state, requestId: requestId });
  return fetch(url, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: payload
  }).then(function() {
    return new Promise(function(resolve) { setTimeout(resolve, 1500); });
  }).then(function() {
    return fetch(url + "?action=read&_t=" + Date.now() + "&id=" + requestId, { redirect: "follow" });
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.status === "ok" && d.timestamp >= ts) {
      localStorage.setItem(STORAGE_KEY + "-ts", String(d.timestamp));
      return d;
    }

    if (encoded.length < 7000) {
      return fetch(url + "?action=write&ts=" + ts + "&data=" + encoded + "&id=" + requestId + "&_t=" + ts, { redirect: "follow" })
        .then(function(r2) { return r2.json(); });
    }
    throw new Error("sync_verify_failed");
  });
}
